<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback360 - Interactive Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:Inter,sans-serif;font-size:14px;background:#e8eaed;}
.material-symbols-outlined{font-variation-settings:"FILL" 0,"wght" 400,"GRAD" 0,"opsz" 24;vertical-align:middle;line-height:1;}

/* Demo toolbar */
.demo-bar{background:#1f2937;color:#fff;padding:8px 16px;display:flex;align-items:center;gap:12px;font-size:12px;font-weight:600;letter-spacing:.04em;flex-shrink:0;}
.demo-bar-title{opacity:.5;text-transform:uppercase;letter-spacing:.1em;}
.demo-toggle{display:flex;gap:4px;background:rgba(255,255,255,.1);border-radius:8px;padding:3px;}
.demo-toggle-btn{padding:5px 14px;border-radius:6px;border:none;background:none;color:rgba(255,255,255,.6);font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;}
.demo-toggle-btn.active{background:#fbbf3b;color:#fff;}

/* App shell */
.f360-app{--f360-bg:#ffffff;--f360-surface:#ffffff;--f360-lefttabblue:#e8e8e8;--f360-lighblue:#fbbf3b;--f360-lighbluetrans:rgba(0,0,0,0.06);--f360-transparentWhite:rgba(255,255,255,0.08);--f360-surface-soft:#f8f9fa;--f360-border:#e2e5ea;--f360-ink:#374151;--f360-muted:#6b7280;--f360-accent:#fbbf3b;--f360-accent-soft:#f5f5f5;--f360-accent-ink:#374151;background:var(--f360-bg);border:1px solid var(--f360-border);border-radius:10px;font-family:Inter,sans-serif;font-size:14px;display:flex;flex-direction:column;height:calc(100vh - 40px);overflow:hidden;margin:0;box-shadow:0 4px 24px rgba(0,0,0,.12);}
.f360-top{background:#fff;border-bottom:1px solid var(--f360-border);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-shrink:0;z-index:100;}
.f360-top-left,.f360-top-right{display:flex;align-items:center;gap:12px;}
.f360-top-left{flex:1 1 auto;}
.f360-top-right{flex:0 0 auto;}
.f360-brand{font-size:22px;font-weight:700;color:var(--f360-ink);letter-spacing:-.3px;}
.f360-brand span{color:var(--f360-accent);font-weight:800;}
.f360-sub{font-size:13px;color:var(--f360-muted);}
.f360-top-burger{font-size:22px;color:var(--f360-ink);cursor:pointer;padding:4px;border-radius:6px;border:none;background:none;display:flex;align-items:center;}
.f360-top-burger:hover{background:var(--f360-surface-soft);}
.f360-btn-back{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--f360-border);border-radius:8px;background:#fff;color:var(--f360-ink);font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;}
.f360-btn-back:hover{background:var(--f360-surface-soft);}

/* Shell */
.f360-shell{display:flex;align-items:stretch;flex:1 1 auto;min-height:0;overflow:hidden;transition:all .25s ease;}
.f360-shell-sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--f360-border);background:#f7f9fb;overflow-y:auto;transition:width .25s ease,padding .25s ease;overflow:hidden;}
.f360-shell.collapsed .f360-shell-sidebar{width:0;border-right-width:0;}
.f360-workspace{display:flex;flex-direction:column;min-width:0;background:#fff;flex:1 1 auto;overflow:hidden;}

/* Sidebar nav */
.f360-side-nav{display:flex;flex-direction:column;gap:4px;padding:14px 10px;}
.f360-side-label{font-size:10px;color:var(--f360-muted);text-transform:uppercase;letter-spacing:.1em;padding:8px 12px 4px;font-weight:700;}
.f360-side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--f360-ink);text-decoration:none;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;width:100%;text-align:left;white-space:nowrap;}
.f360-side-item:hover{background:#fff;}
.f360-side-item.active{background:#e8e8e8;color:#1f2937;}
.f360-side-item.active .f360-side-icon{color:#1f2937;}
.f360-side-icon{font-size:18px;color:#6b7280;flex-shrink:0;}

/* Content */
.f360-content{padding:18px;display:flex;flex-direction:column;gap:16px;flex:1 1 auto;min-height:0;overflow:auto;background:#fff;}
.f360-content.no-pad{padding:0;gap:0;overflow:hidden;}

/* Locked banner */
.f360-locked-banner{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#f5f5f5;border:1px solid #e2e5ea;border-left:4px solid #fbbf3b;border-radius:10px;flex-shrink:0;}
.f360-locked-banner .material-symbols-outlined{color:#374151;font-size:20px;flex-shrink:0;font-variation-settings:"FILL" 1;}
.f360-locked-banner-text{font-size:13px;color:#46464d;line-height:1.5;}

/* Overview */
.f360-overview{display:flex;flex-direction:column;gap:20px;}
.f360-overview-title{font-size:32px;font-weight:900;color:#1f2937;letter-spacing:-.5px;margin:0;}
.f360-overview-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.f360-session-pill{display:inline-flex;align-items:center;gap:8px;background:#fff;padding:8px 14px;border-radius:8px;border:1px solid #e2e5ea;}
.f360-session-pill-icon{color:#fbbf3b;font-size:16px;}
.f360-session-pill-text{color:#1f2937;font-weight:700;font-size:13px;}
.f360-overview-media{background:#fff;border:1px solid #e2e5ea;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:14px;}
.f360-overview-media-placeholder{width:100%;min-height:160px;border:1px dashed #e2e5ea;border-radius:10px;background:linear-gradient(135deg,#f8fafc,#f5f5f5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#6b7280;}
.f360-overview-media-placeholder .material-symbols-outlined{font-size:36px;color:#fbbf3b;}
.f360-overview-media-copy{font-size:14px;color:#46464d;line-height:1.7;}
.f360-bento{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.f360-bento-kpi{position:relative;background:#fff;border:1px solid #e2e5ea;border-radius:12px;padding:18px;}
.f360-bento-kpi.f360-kpi-dark{background:#f0f0f0;border-color:#e2e5ea;}
.f360-kpi-dark-orb{position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:#fbbf3b;opacity:.12;}
.f360-kpi-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.f360-kpi-icon{width:38px;height:38px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;}
.f360-kpi-amber .f360-kpi-icon{background:rgba(0,0,0,0.05);color:#374151;}
.f360-kpi-teal .f360-kpi-icon{background:rgba(0,0,0,0.05);color:#fbbf3b;}
.f360-kpi-ink .f360-kpi-icon{background:rgba(0,0,0,0.06);color:#1f2937;}
.f360-kpi-dark .f360-kpi-icon{background:rgba(255,255,255,.1);color:#fbbf3b;}
.f360-kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#46464d;}
.f360-kpi-dark .f360-kpi-label{color:#6b7280;}
.f360-kpi-value-row{display:flex;align-items:baseline;gap:8px;}
.f360-kpi-value{font-size:38px;font-weight:900;color:#1f2937;line-height:1;}
.f360-kpi-dark .f360-kpi-value{color:#1f2937;}
.f360-kpi-unit{font-size:12px;color:#46464d;}
.f360-kpi-dark .f360-kpi-unit{color:#fbbf3b;}
.f360-kpi-status{display:flex;align-items:center;gap:8px;}
.f360-kpi-status-icon{font-size:22px;}
.f360-kpi-status-icon.is-success{color:#2e7d32;font-variation-settings:"FILL" 1;}
.f360-kpi-status-icon.is-warning{color:#f57c00;}
.f360-kpi-status-text{font-size:18px;font-weight:800;color:#1f2937;}
.f360-bento-session{grid-column:1 / -1;background:#fff;border:1px solid #e2e5ea;border-radius:12px;padding:22px;}
.f360-session-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.f360-session-title{font-size:18px;font-weight:800;color:#1f2937;margin:0;}
.f360-session-badge{display:inline-block;padding:4px 10px;background:rgba(0,0,0,0.05);color:#374151;font-weight:700;font-size:10px;border-radius:6px;text-transform:uppercase;letter-spacing:.08em;}
.f360-session-body{color:#46464d;margin:0 0 16px;line-height:1.5;font-size:13px;}
.f360-session-progress-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;}
.f360-session-progress-label{font-size:10px;font-weight:700;color:#1f2937;text-transform:uppercase;letter-spacing:.1em;}
.f360-session-progress-value{font-size:18px;font-weight:900;color:#fbbf3b;}
.f360-session-progress-track{width:100%;height:12px;background:#f0f2f5;border-radius:6px;overflow:hidden;}
.f360-session-progress-fill{height:100%;background:#fbbf3b;border-radius:6px;}
.f360-session-progress-footer{display:flex;justify-content:space-between;font-size:10px;color:rgba(70,70,77,.6);text-transform:uppercase;font-weight:700;margin-top:6px;}

/* Hub (My Evaluations) */
.f360-hub{display:flex;height:100%;overflow:hidden;min-height:0;}
.f360-hub-list{width:280px;flex-shrink:0;border-right:1px solid var(--f360-border);display:flex;flex-direction:column;overflow:hidden;background:#fff;}
.f360-hub-list-header{padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--f360-muted);border-bottom:1px solid var(--f360-border);flex-shrink:0;}
.f360-hub-list-scroll{overflow-y:auto;flex:1;}
.f360-hub-list-empty{padding:14px;color:var(--f360-muted);font-size:12px;}
.f360-hub-card{display:flex;align-items:flex-start;gap:10px;padding:14px;border-bottom:1px solid var(--f360-border);background:#fff;cursor:pointer;transition:background .15s;}
.f360-hub-card:hover{background:#f8f9fa;}
.f360-hub-card.is-active{background:var(--f360-accent-soft);border-left:3px solid var(--f360-accent);padding-left:11px;}
.f360-hub-card-avatar-wrap{width:40px;height:40px;flex-shrink:0;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.f360-hub-avatar-fallback{width:40px;height:40px;border-radius:50%;background:#e5e7eb;color:#1f2937;font-weight:700;font-size:12px;display:inline-flex;align-items:center;justify-content:center;}
.f360-hub-card-body{flex:1;min-width:0;}
.f360-hub-card-name{font-size:14px;font-weight:700;color:var(--f360-ink);}
.f360-hub-card-type{font-size:12px;font-weight:600;color:var(--f360-ink);}
.f360-hub-card-meta{font-size:11px;color:var(--f360-muted);}
.f360-hub-card-status{font-size:10px;font-weight:700;margin-top:4px;display:inline-flex;padding:3px 8px;border-radius:99px;}
.f360-hub-card-status.is-todo{background:#fff4d7;color:#6c4a00;}
.f360-hub-card-status.is-progress{background:#f5f5f5;color:#374151;}
.f360-hub-card-status.is-completed{background:#e8f6ea;color:#2e7d32;}
.f360-hub-card-status.is-closed{background:#f5f5f5;color:#555;}
.f360-hub-card-actions{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.f360-hub-card-btn{display:block;padding:7px 10px;border-radius:7px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;width:100%;}
.f360-hub-card-btn-primary{background:#e8e8e8;color:#fbbf3b;}
.f360-hub-card-btn-secondary{background:#f5f5f5;color:#374151;border:1px solid #e2e5ea;}
.f360-hub-card-btn:hover{opacity:.88;}
.f360-hub-panel{flex:1;overflow-y:auto;background:#fff;min-width:0;}
.f360-hub-panel-inner{padding:24px 28px;display:flex;flex-direction:column;gap:16px;}
.f360-hub-panel-title{font-size:24px;font-weight:900;color:#1f2937;margin:0;letter-spacing:-.02em;}
.f360-hub-panel-subtitle{font-size:13px;color:#6b7280;line-height:1.5;}
.f360-hub-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--f360-muted);font-size:14px;text-align:center;gap:10px;padding:32px;}
.f360-hub-empty-icon{font-size:32px;color:#9ca3af;}
.f360-hub-question-block{border:1px solid #e2e5ea;border-radius:10px;padding:16px;background:#fff;display:flex;flex-direction:column;gap:10px;}
.f360-hub-question-text{font-size:14px;font-weight:700;color:var(--f360-ink);line-height:1.4;}
.f360-hub-comments{display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.f360-hub-comments label{font-size:12px;font-weight:600;color:var(--f360-ink);}
.f360-hub-comments textarea{width:100%;min-height:90px;border:1px solid #e2e5ea;border-radius:8px;padding:10px;font-size:13px;resize:vertical;font-family:inherit;}
.f360-hub-comments-count{font-size:10px;color:var(--f360-muted);align-self:flex-end;}
.f360-hub-submit-row{display:flex;justify-content:flex-end;}
.f360-hub-submit-btn{padding:10px 24px;background:#e8e8e8;color:#fbbf3b;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
.f360-hub-submit-btn:hover{opacity:.9;}
.f360-hub-readonly-summary{display:flex;flex-direction:column;gap:6px;padding:12px 14px;border:1px solid #e2e5ea;border-radius:8px;background:#f8f9fa;}
.f360-hub-readonly-label{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#6b7280;}
.f360-hub-readonly-answer{font-size:13px;color:var(--f360-ink);}

/* Likert scale */
.f360-likert{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;}
.f360-likert-option{position:relative;}
.f360-likert-option input{position:absolute;opacity:0;pointer-events:none;}
.f360-likert-option label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:64px;border:1px solid #e2e5ea;border-radius:8px;background:#fff;padding:8px;text-align:center;cursor:pointer;transition:all .15s;}
.f360-likert-option input:checked+label{background:#fbbf3b;color:#1f2937;border-color:#fbbf3b;}
.f360-likert-option label:hover{transform:translateY(-1px);border-color:#fbbf3b;}
.f360-likert-score{font-size:16px;font-weight:900;line-height:1;}
.f360-likert-label{font-size:10px;font-weight:700;opacity:.8;}

/* Respondents panel */
.f360-respondents-layout{display:flex;height:100%;min-height:0;}
.f360-respondents-main{flex:1;padding:20px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.f360-respondents-search{width:260px;flex-shrink:0;border-left:1px solid #e2e5ea;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:#fbfcfd;}
.f360-respondents-search-title{font-size:14px;font-weight:800;color:#1f2937;}
.f360-respondents-search input{width:100%;padding:8px 12px;border:1px solid #e2e5ea;border-radius:7px;font-size:13px;font-family:inherit;}
.f360-respondents-category{padding:14px 0;border-bottom:1px solid #e2e5ea;display:flex;flex-direction:column;gap:8px;}
.f360-respondents-category-head{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.f360-respondents-category-name{font-size:14px;font-weight:700;color:var(--f360-accent);}
.f360-respondents-category-count{font-size:20px;font-weight:900;color:var(--f360-ink);}
.f360-respondents-category-limits{font-size:11px;color:var(--f360-muted);}
.f360-respondents-members{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
.f360-respondents-member-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:#f0f2f5;border:1px solid #e2e5ea;font-size:11px;color:var(--f360-ink);}
.f360-respondents-add-btn{padding:7px 14px;background:#fbbf3b;color:#1f2937;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;align-self:flex-start;}
.f360-respondents-search-item{display:flex;flex-direction:column;gap:6px;padding:10px;border:1px solid #e2e5ea;border-radius:8px;background:#fff;}
.f360-respondents-search-name{font-size:12px;font-weight:700;color:var(--f360-ink);}
.f360-respondents-search-add{padding:5px 10px;background:#fbbf3b;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}

/* Results */
.f360-results-page{display:flex;flex-direction:column;gap:0;height:100%;min-height:0;overflow:hidden;}
.f360-results-header{padding:16px 20px;border-bottom:1px solid #e2e5ea;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.f360-results-title{font-size:20px;font-weight:900;color:#1f2937;}
.f360-results-body{display:flex;flex:1 1 auto;min-height:0;overflow:hidden;}
.f360-results-nav{width:220px;flex-shrink:0;border-right:1px solid #e2e5ea;display:flex;flex-direction:column;overflow:hidden;}
.f360-results-nav-scroll{overflow-y:auto;flex:1;}
.f360-results-nav-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-left:3px solid transparent;cursor:pointer;font-size:13px;color:var(--f360-ink);border-bottom:1px solid #f0f2f5;}
.f360-results-nav-item:hover{background:#f8f9fa;}
.f360-results-nav-item.active{border-left-color:#fbbf3b;background:#f5f5f5;font-weight:700;}
.f360-results-nav-score{font-weight:700;font-size:13px;color:#1f2937;}
.f360-results-nav-footer{padding:12px;border-top:1px solid #e2e5ea;flex-shrink:0;}
.f360-results-pdf-btn{width:100%;padding:9px;border:1px solid #e2e5ea;border-radius:8px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.f360-results-center{width:300px;flex-shrink:0;border-right:1px solid #e2e5ea;display:flex;flex-direction:column;overflow:hidden;}
.f360-results-center-header{padding:10px 14px;border-bottom:1px solid #e2e5ea;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.f360-results-center-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#46464d;}
.f360-results-center-list{overflow-y:auto;flex:1;}
.f360-competency-item{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:10px 14px;border-bottom:1px solid #f0f2f5;cursor:pointer;font-size:12px;}
.f360-competency-item:hover{background:#f8f9fa;}
.f360-competency-item.active{background:#f5f5f5;}
.f360-competency-text{flex:1;line-height:1.4;color:var(--f360-ink);}
.f360-competency-score{font-weight:700;color:#1f2937;flex-shrink:0;font-size:13px;}
.f360-results-charts{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;}
.f360-chart-block{display:flex;flex-direction:column;gap:8px;}
.f360-chart-title{font-size:13px;font-weight:700;color:#1f2937;text-align:center;}
.f360-chart-wrap{border:1px solid #e2e5ea;border-radius:8px;padding:12px;background:#fff;min-height:180px;display:flex;align-items:center;justify-content:center;}

/* Self evaluation */
.f360-self-shell{display:flex;flex-direction:column;gap:16px;}
.f360-self-hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;background:#fff;border:1px solid #e2e5ea;border-radius:12px;padding:20px;flex-wrap:wrap;}
.f360-self-hero-copy{min-width:0;}
.f360-self-breadcrumb{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;margin-bottom:6px;}
.f360-self-title{font-size:28px;font-weight:900;color:#1f2937;line-height:1.05;margin:0 0 8px 0;}
.f360-self-intro{font-size:14px;color:#46464d;line-height:1.6;}
.f360-self-summary{min-width:200px;background:#fff;border:1px solid #e2e5ea;border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.f360-self-summary-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#6b7280;}
.f360-self-summary-value{font-size:30px;font-weight:900;color:#1f2937;line-height:1;margin-top:4px;}
.f360-self-summary-note{font-size:12px;color:#46464d;margin-top:6px;line-height:1.4;}
.f360-self-question-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.f360-self-question-card{position:relative;background:#fff;border:1px solid #e2e5ea;border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:10px;}
.f360-self-question-card.is-opentext{grid-column:1 / -1;}

.f360-self-question-stack{display:flex;flex-direction:column;gap:14px;}
.f360-self-question-stack .f360-self-question-card{width:100%;}

<script>

const DATA = {

  ],
  requests: [
    { id: 20, evaluated: 'Léa Nasr', reviewer: 'John Smith', role: 'Manager 360', status: 'inprogress', deadline: '15/05/26', progress: 60 },
    { id: 21, evaluated: 'Léa Nasr', reviewer: 'Julie Dubois', role: 'Expert 360', status: 'completed', deadline: '10/05/26', progress: 100 },
    { id: 22, evaluated: 'John Smith', reviewer: 'Léa Nasr', role: 'Peer', status: 'pending', deadline: '20/05/26', progress: 0 },
    { id: 23, evaluated: 'Marc Bertrand', reviewer: 'Léa Nasr', role: 'Colleague', status: 'pending', deadline: '18/05/26', progress: 0 },

  competencies: [
    { name: 'Actively seeks out new ideas', score: 3.4 },
    { name: 'Promotes creativity and innovation', score: 3.0 },
    { name: 'Challenges teams to simplify', score: 3.3 },

  resultSections: [

    { id: 'business', label: 'Business agility', score: 3.33, color: '#7c3aed' },
    { id: 'people', label: 'Agility with people', score: 3.14, color: '#dc2626' },
    { id: 'myagility', label: 'My agility', score: 3.26, color: '#16a34a' },
    { id: 'overall', label: 'Overall results', score: 3.5, color: '#fbbf3b' },
    { id: 'highlighted', label: 'Highlighted behaviours', score: null, arrow: true },
    { id: 'comments', label: 'Comments and Developmental Questions', score: null, arrow: true },
  ],
  adminGroupTemplates: [
    { id: 1, name: 'Customers', min: 3, max: 10 },
    { id: 2, name: 'Direct reports/mentees', min: 3, max: 15 },
    { id: 3, name: 'Functional Manager', min: 0, max: 1 },
    { id: 4, name: 'Operational Manager', min: 1, max: 1 },
  ],
  questionCards: [
    { id: 1, title: 'Actively seeks out and considers new ideas', type: 'Likert', competence: 'Business Agility', status: 'active' },
    { id: 2, title: 'Promotes creativity and risk taking', type: 'Likert', competence: 'Business Agility', status: 'active' },
    { id: 3, title: 'Challenges teams to simplify', type: 'Likert', competence: 'Agility with People', status: 'active' },
    { id: 4, title: 'Gets things done cross-functionally', type: 'Likert', competence: 'Agility with People', status: 'active' },
    { id: 5, title: 'Key strengths and areas for development', type: 'Open Text', competence: '', status: 'active' },

// ── State ────────────────────────────────────────────────────────────────────
let role = 'participant'; // 'participant' | 'manager'
let activeTab = 'overview';
let hubPanel = ''; // 'self' | 'request' | 'respondents' | 'results' | ''
let activeRequestId = null;
let activeResultSection = 'business';
let selfAnswers = { ...DATA.selfanswers };
let sidebarCollapsed = false;
let saveNotifTimer = null;

// ── Tab configs ──────────────────────────────────────────────────────────────
const PARTICIPANT_TABS = [
  { key: 'overview', label: 'Overview', icon: 'grid_view' },
  { key: 'myevaluations', label: 'My Evaluations', icon: 'assignment' },
  { key: 'results', label: 'Results', icon: 'bar_chart' },
];
const MANAGER_TABS = [
  { key: 'overview', label: 'Overview', icon: 'grid_view' },
  { key: 'myevaluations', label: 'My Evaluations', icon: 'assignment' },
  { key: 'results', label: 'Results', icon: 'bar_chart' },
  { key: 'questions', label: 'Questions', icon: 'help' },
  { key: 'groups', label: 'Groups', icon: 'groups' },
  { key: 'settings', label: 'Settings', icon: 'settings' },
];

// ── Helpers ──────────────────────────────────────────────────────────────────
function setRole(r, btn) {
  role = r;
  document.querySelectorAll('.demo-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = 'overview';
  hubPanel = '';
  activeRequestId = null;
  // Show/hide burger menu based on role
  const burger = document.querySelector('.f360-top-burger');
  if (burger) burger.style.display = role === 'participant' ? 'none' : '';
  renderSidebar();
  renderContent();
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('f360Shell').classList.toggle('collapsed', sidebarCollapsed);
}

function navTo(tab) {
  activeTab = tab;
  hubPanel = '';
  activeRequestId = null;
  renderSidebar();
  renderContent();
  window.scrollTo(0, 0);
}

function openHubPanel(panel, rid) {
  hubPanel = panel;
  activeRequestId = rid || null;
  renderContent();
}

function showSaveNotif() {
  const el = document.getElementById('saveNotif');
  if (!el) return;
  el.classList.remove('hidden');
  clearTimeout(saveNotifTimer);
  saveNotifTimer = setTimeout(() => el.classList.add('hidden'), 3000);
}

function statusClass(s) {
  if (s === 'pending' || s === 'accepted') return 'is-todo';
  if (s === 'inprogress') return 'is-progress';
  if (s === 'completed' || s === 'submitted') return 'is-completed';
  return 'is-closed';
}
function statusLabel(s) {
  if (s === 'pending' || s === 'accepted') return 'To-Do';
  if (s === 'inprogress') return 'In Progress';
  if (s === 'completed' || s === 'submitted') return 'Completed';
  return s;
}

function selfProgress() {
  const answered = Object.keys(selfAnswers).length;
  const total = DATA.questions.length;
  return { answered, total, pct: Math.round((answered / Math.max(total, 1)) * 100) };
}

function selfStatus() {
  const { answered, total } = selfProgress();
  if (answered >= total) return { label: 'Completed', cls: 'is-completed' };
  if (answered > 0) return { label: 'In Progress', cls: 'is-progress' };
  return { label: 'To-Do', cls: 'is-todo' };

function renderSidebar() {

  const topTabs = document.getElementById('participantTopTabs');

    topTabs.innerHTML = tabs.map(t => `

// ── Content dispatcher ───────────────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('f360Content');
  content.className = 'f360-content';

  let html = '';


  switch (activeTab) {
    case 'overview':      html += renderOverview(); break;
    case 'myevaluations': html = renderMyEvaluations(); content.className = 'f360-content no-pad'; return renderToContent(html); break;
    case 'results':       html = renderResults(); content.className = 'f360-content no-pad'; return renderToContent(html); break;
    case 'participants':  html += renderParticipants(); break;
    case 'groups':        html += renderGroups(); break;
    case 'mygroups':      html += renderMyGroups(); break;
    case 'requests':      html += renderRequests(); break;
    case 'self':          html += renderSelf(); break;
    case 'questions':     html += renderQuestions(); break;
    case 'settings':      html += renderSettings(); break;
    default:              html += `<div class="f360-empty">Tab "${activeTab}" not available in prototype.</div>`; break;
  }
  content.innerHTML = html;
  afterRender();
}

function renderToContent(html) {
  document.getElementById('f360Content').innerHTML = html;
  afterRender();
}

function afterRender() {
  // Init charts if results tab
  if (activeTab === 'results' || (activeTab === 'myevaluations' && hubPanel === 'results')) {
    initCharts();
  }
}

function showSearchPanel(groupId) {
  activeGroupId = groupId;
  filterSearch('');
}

function closeSearchPanel() {
  const sp = document.getElementById('searchPanel');
  if (sp) { const si = document.getElementById('searchInput'); if (si) si.value = ''; const sr = document.getElementById('searchResults'); if (sr) sr.innerHTML = ''; }
}

function filterSearch(q) {
  const results = document.getElementById('searchResults');
  if (!results) return;
  const filtered = searchUsers.filter(u => !q || u.name.toLowerCase().includes(q.toLowerCase()) || u.email.toLowerCase().includes(q.toLowerCase()));
  results.innerHTML = filtered.map(u => `
    <div class="f360-respondents-search-item">
      <div class="f360-respondents-search-name">${u.name}</div>
      <div style="font-size:11px;color:#6b7280;">${u.email}</div>
      <button class="f360-respondents-search-add" onclick="addMember('${u.name}')">Add to group</button>
    </div>
  `).join('') || '<div style="font-size:12px;color:#9ca3af;padding:8px;">No results found</div>';
}

function addMember(name) {
  if (!activeGroupId) return;
  const g = DATA.groups.find(g => g.id === activeGroupId);
  if (g && !g.members.includes(name) && g.count < g.max) {
    g.members.push(name);
    g.count++;
    openHubPanel('respondents', null);
  }
}

function removeMember(groupId) {
  const g = DATA.groups.find(g => g.id === groupId);
  if (g && g.members.length > 0) {
    g.members.pop();
    g.count = Math.max(0, g.count - 1);
    openHubPanel('respondents', null);
  }
}

          <div class="f360-chart-title">Result by Respondent Type</div>
          <div class="f360-chart-wrap">
            <canvas id="chartByType" width="260" height="180"></canvas>
          </div>
        </div>
      </div>
    </div>
  `;
}

function setResultSection(id) {
  activeResultSection = id;
  const nav = document.querySelector('.f360-results-nav-scroll');
  if (!nav) return;
  nav.querySelectorAll('.f360-results-nav-item').forEach((el, i) => {
    el.classList.toggle('active', DATA.resultSections[i].id === id);
  });
}

function initCharts() {
  const overallCtx = document.getElementById('chartOverall');
  const byTypeCtx = document.getElementById('chartByType');
  if (overallCtx && !overallCtx._chart) {
    overallCtx._chart = new Chart(overallCtx, {
      type: 'bar',
      data: {
        labels: ['Myself', 'Global Avg'],
        datasets: [{ data: [3.33, 3.68], backgroundColor: ['#fbbf3b', '#6b7280'], borderRadius: 4, barThickness: 40 }]
      },
      options: { responsive: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 5, ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } } }
    });
  }
  if (byTypeCtx && !byTypeCtx._chart) {
    byTypeCtx._chart = new Chart(byTypeCtx, {
      type: 'bar',
      data: {
        labels: ['Self', 'Manager', 'Functional', 'Direct Rep', 'Customers', 'Expert'],
        datasets: [{ data: [2.9, 3.5, 3.8, 2.6, 3.0, 2.5], backgroundColor: '#fbbf3b', borderRadius: 4, barThickness: 22 }]
      },
      options: { responsive: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 5, ticks: { font: { size: 9 } } }, x: { ticks: { font: { size: 9 } } } } }
    });
  }
}

// ── Participants ──────────────────────────────────────────────────────────────
function renderParticipants() {
  const rows = DATA.participants.map(p => `
    <tr>
      <td><div style="font-weight:600;color:#374151;">${p.name}</div></td>
      <td style="color:#6b7280;font-size:12px;">${p.email}</td>
      <td><button class="f360-btn" style="font-size:11px;padding:5px 10px;">Remove</button></td>
    </tr>
  `).join('');

  return `
    <div class="f360-participants">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;">
        <div>
          <h2 style="font-size:24px;font-weight:900;color:#1f2937;margin:0 0 4px;">Participants</h2>
          <p style="font-size:13px;color:#46464d;margin:0;">Showing ${DATA.participants.length} of ${DATA.participants.length} participants</p>
        </div>
      </div>
      <div class="f360-participants-filterbar">
        <div class="f360-field">
          <label>Search</label>
          <input class="f360-input" type="text" placeholder="Search name or email...">
        </div>
        <button class="f360-btn primary" style="align-self:flex-end;">Apply</button>
        <button class="f360-btn" style="align-self:flex-end;">Clear</button>
      </div>
      <div class="f360-table-wrap">
        <table class="f360-table">
          <thead><tr><th>Participant</th><th>Email</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="f360-settings-card">
        <div class="f360-settings-card-head">
          <span class="material-symbols-outlined f360-settings-card-icon f360-icon-teal">group_add</span>
          <h3 class="f360-settings-card-title">Add Participant</h3>
        </div>
        <div class="f360-settings-grid-2">
          <div class="f360-field">
            <label class="f360-settings-field-label">Select User</label>
            <select class="f360-input f360-select">
              <option value="">Select a user...</option>
              <option>New User A</option>
              <option>New User B</option>
            </select>
          </div>
        </div>
        <div class="f360-actions">
          <button class="f360-btn primary">Add Participant</button>
        </div>
      </div>
    </div>
  `;
}

// ── Groups (admin) ────────────────────────────────────────────────────────────
function renderGroups() {
  const cards = DATA.adminGroupTemplates.map(g => `
    <div class="f360-group-card-large">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="f360-group-avatar">${g.name.slice(0,2).toUpperCase()}</div>
        <div>
          <div class="f360-group-card-name">${g.name}</div>
          <div class="f360-group-card-meta">Per-participant template</div>
        </div>
      </div>
      <div class="f360-group-card-stats">
        <div>
          <div class="f360-group-stat-value">${g.min !== null ? g.min : '—'}</div>
          <div class="f360-group-stat-label">Min</div>
        </div>
        <div>
          <div class="f360-group-stat-value">${g.max !== null ? g.max : '∞'}</div>
          <div class="f360-group-stat-label">Max</div>
        </div>
      </div>
    </div>
  `).join('');

  return `
    <div class="f360-groups">
      <div class="f360-settings-head">
        <div>
          <h2 class="f360-settings-title">Groups</h2>
          <p class="f360-settings-subtitle">Define evaluator group templates with capacity rules. Participants assign their own evaluators to these groups privately.</p>
        </div>
      </div>
      <div class="f360-settings-card">
        <div class="f360-settings-card-head">
          <span class="material-symbols-outlined f360-settings-card-icon f360-icon-amber">group_add</span>
          <h3 class="f360-settings-card-title">Create Group Template</h3>
        </div>
        <div class="f360-settings-grid-3">
          <div class="f360-field">
            <label class="f360-settings-field-label">Group Name</label>
            <input class="f360-input" type="text" placeholder="e.g. Customers">
          </div>
          <div class="f360-field">
            <label class="f360-settings-field-label">Minimum</label>
            <input class="f360-input" type="number" min="0" placeholder="No minimum">
          </div>
          <div class="f360-field">
            <label class="f360-settings-field-label">Maximum</label>
            <input class="f360-input" type="number" min="0" placeholder="No maximum">
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;">
          <button class="f360-btn-save"><span class="material-symbols-outlined" style="font-size:16px;">add</span> Create Group</button>
        </div>
      </div>
      <div class="f360-groups-grid">${cards}</div>
    </div>
  `;
}

// ── My Groups (participant) ───────────────────────────────────────────────────
function renderMyGroups() {
  return `
    <div class="f360-groups">
      <div>
        <h2 class="f360-settings-title">My Groups</h2>
        <p class="f360-settings-subtitle">Privately assign evaluators to each group category.</p>
      </div>
      <div class="f360-groups-grid">
        ${DATA.groups.map(g => {
          const pct = g.max > 0 ? Math.round((g.count / g.max) * 100) : (g.count > 0 ? 100 : 0);
          return `
            <div class="f360-group-card-large">
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="f360-group-avatar">${g.name.slice(0,2).toUpperCase()}</div>
                <div>
                  <div class="f360-group-card-name">${g.name}</div>
                  <div class="f360-group-card-meta">min ${g.min} · max ${g.max}</div>
                </div>
              </div>
              ${g.members.length ? `
                <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px;">
                  ${g.members.map(m => `<li style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#f8f9fa;border:1px solid #e2e5ea;border-radius:7px;font-size:12px;">${m} <button onclick="" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:13px;">×</button></li>`).join('')}
                </ul>
              ` : `<div class="f360-empty">No evaluators assigned</div>`}
              <div>
                <div style="display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#46464d;font-weight:700;margin-bottom:5px;">
                  <span>My selection</span><span>${g.count}${g.max > 0 ? ' / ' + g.max : ''}</span>
                </div>
                <div class="f360-group-progress-track"><div class="f360-group-progress-fill" style="width:${pct}%"></div></div>
              </div>
              ${g.count < g.max ? `
                <div style="display:flex;gap:6px;align-items:center;">
                  <select class="f360-input f360-select" style="flex:1;">
                    <option>Add evaluator...</option>
                    <option>Anna Kowalski</option>
                    <option>Pierre Dupont</option>
                    <option>Sarah Johnson</option>
                  </select>
                  <button class="f360-btn primary" style="display:flex;align-items:center;gap:4px;"><span class="material-symbols-outlined" style="font-size:15px;">add</span> Add</button>
                </div>
              ` : `<div class="f360-empty">Maximum reached</div>`}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ── Requests ──────────────────────────────────────────────────────────────────
function renderRequests() {
  const rows = DATA.requests.map(r => `
    <div class="f360-requests-row">
      <div>
        <div class="f360-rt-name">${r.evaluated}</div>
        <div class="f360-rt-name-sub">Reviewer: ${r.reviewer}</div>
      </div>
      <div><span class="f360-rt-pill">${r.role}</span></div>
      <div class="f360-rt-deadline${r.deadline === '10/05/26' ? ' is-soon' : ''}">${r.deadline}</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#46464d;margin-bottom:4px;">${r.progress}%</div>
        <div class="f360-rt-progress-track">
          <div class="f360-rt-progress-fill${r.progress === 100 ? ' is-full' : ''}" style="width:${r.progress}%"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        ${r.status === 'completed' ? `<button class="f360-rt-btn f360-rt-btn-view">View</button>` :
          r.status === 'pending' ? `<button class="f360-rt-btn f360-rt-btn-accept">Accept</button>` :
          `<button class="f360-rt-btn f360-rt-btn-continue">Continue</button>`}
      </div>
    </div>
  `).join('');

  return `
    <div class="f360-requests">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
        <div>
          <h2 class="f360-requests-title">Requests</h2>
          <p class="f360-requests-subtitle">Manage incoming and outgoing evaluation requests. Accept, complete or view submitted evaluations.</p>
        </div>
        <button class="f360-btn primary" style="display:inline-flex;align-items:center;gap:6px;border-radius:8px;">
          <span class="material-symbols-outlined" style="font-size:16px;">add</span> New Request
        </button>
      </div>
      <div class="f360-requests-filtercard">
        <div class="f360-field"><label>Search</label><input class="f360-input" type="text" placeholder="Search name..."></div>
        <div class="f360-field"><label>Role</label><select class="f360-input f360-select"><option>All roles</option></select></div>
        <div class="f360-field"><label>Status</label><select class="f360-input f360-select"><option>All</option><option>Pending</option><option>In Progress</option><option>Completed</option></select></div>
        <div class="f360-field"><label>Deadline</label><select class="f360-input f360-select"><option>All</option><option>Soon</option><option>Overdue</option></select></div>
        <div style="align-self:flex-end;display:flex;gap:6px;">
          <button class="f360-btn primary">Apply</button>
          <button class="f360-btn">Clear</button>
        </div>
      </div>
      <div class="f360-requests-table">
        <div class="f360-requests-table-header">
          <div>Evaluated</div><div>Role</div><div>Deadline</div><div>Progress</div><div style="text-align:right">Action</div>
        </div>
        ${rows}
      </div>
    </div>
  `;
}

// ── Self (standalone manager view) ───────────────────────────────────────────
function renderSelf() {
  return renderSelfPanel();
}

// ── Questions ─────────────────────────────────────────────────────────────────
function renderQuestions() {
  const cards = DATA.questionCards.map((q, i) => `
    <div class="f360-question-card">
      <div class="f360-question-card-head">
        <div>
          <div class="f360-question-card-title">${q.title}</div>
          <div class="f360-question-card-meta">${q.competence || 'General'}</div>
        </div>
        <div style="display:flex;gap:5px;align-items:center;flex-shrink:0;">
          <span class="f360-badge">${q.type}</span>
          <button class="f360-icon-btn"><span class="material-symbols-outlined" style="font-size:16px;">edit</span></button>
          <button class="f360-icon-btn"><span class="material-symbols-outlined" style="font-size:16px;">delete</span></button>
        </div>
      </div>
    </div>
  `).join('');

  return `
    <div class="f360-questions">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;">
        <div>
          <h2 style="font-size:24px;font-weight:900;color:#1f2937;margin:0 0 4px;">Questions</h2>
          <p style="font-size:13px;color:#46464d;margin:0;">${DATA.questionCards.length} questions configured</p>
        </div>
        <button class="f360-btn primary" style="display:inline-flex;align-items:center;gap:6px;">
          <span class="material-symbols-outlined" style="font-size:16px;">add</span> Add Question
        </button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;background:#fff;border:1px solid #e2e5ea;border-radius:10px;padding:14px 18px;">
        <div class="f360-field"><label>Type</label><select class="f360-input f360-select"><option>All types</option><option>Open Text</option><option>Likert</option><option>Multiple Choice</option><option>Single Choice</option><option>True or False</option></select></div>
        <div class="f360-field"><label>Competence</label><select class="f360-input f360-select"><option>All competences</option><option>Business Agility</option><option>Agility with People</option></select></div>
        <div class="f360-field"><label>Status</label><select class="f360-input f360-select"><option>All</option><option>Active</option><option>Inactive</option></select></div>
        <div style="align-self:flex-end;"><button class="f360-btn primary">Apply</button></div>
      </div>
      ${cards}
    </div>
  `;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function renderSettings() {
  return `
    <div class="f360-settings">
      <div class="f360-settings-head">
        <div>
          <h2 class="f360-settings-title">Settings</h2>
          <p class="f360-settings-subtitle">Manage your evaluation configuration.</p>
        </div>
      </div>
      <div>
        <button class="f360-btn-save" onclick="return false;">
          <span class="material-symbols-outlined" style="font-size:18px;">edit</span>
          Edit evaluation
        </button>
      </div>
    </div>
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
// Default role is participant — hide burger
document.querySelector('.f360-top-burger').style.display = 'none';
renderSidebar();
renderContent();
</script>
